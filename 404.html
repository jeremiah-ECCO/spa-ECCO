<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 · Not Found · Sovereign Provenance Architecture</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#fdfdfb;
  --ink:#15191e;
  --ink-soft:#3a414a;
  --ink-faint:#6c7480;
  --accent:#0a5d6b;
  --rule:#d8d4cc;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:17px;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-weight:400;
  line-height:1.65;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 24px;
  background-image:
    linear-gradient(to bottom,var(--paper) 0%,var(--paper) 100%),
    repeating-linear-gradient(to bottom,transparent 0,transparent 31px,rgba(0,0,0,0.012) 31px,rgba(0,0,0,0.012) 32px);
  background-blend-mode:multiply;
}
.frame{
  max-width:560px;
  text-align:center;
  border-top:2px solid var(--ink);
  border-bottom:1px solid var(--rule);
  padding:48px 24px;
}
.code{
  font-family:'Outfit',sans-serif;
  font-size:11px;
  letter-spacing:0.32em;
  font-weight:600;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-bottom:16px;
}
.message{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  font-weight:400;
  font-style:italic;
  color:var(--ink);
  margin-bottom:24px;
  line-height:1.3;
}
.detail{
  font-size:16px;
  color:var(--ink-soft);
  margin-bottom:36px;
}
.action{
  font-family:'Outfit',sans-serif;
  font-size:12px;
  letter-spacing:0.18em;
  font-weight:600;
  text-transform:uppercase;
  color:var(--accent);
  text-decoration:none;
  border-bottom:1px solid var(--accent);
  padding-bottom:2px;
}
.action:hover{color:var(--ink);border-bottom-color:var(--ink);}
.footnote{
  margin-top:28px;
  font-family:'Outfit',sans-serif;
  font-size:10px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--ink-faint);
}
</style>
</head>
<body>
<div class="frame">
  <div class="code">404 · Document Not Found</div>
  <div class="message">The path you followed leads to a record that does not exist here.</div>
  <div class="detail">The Sovereign Provenance Architecture lives at a stable URL. Versioned snapshots persist; ad-hoc paths do not.</div>
  <a href="/" class="action">Return to canonical SPA →</a>
  <div class="footnote">Ethereal Connections Co. · Stewardship</div>
</div>
</body>
</html>
